# WebSocket-Upgrade-Header nur durchreichen, wenn der Client ihn auch sendet.
# Sonst stört der Connection-Header normale REST-Anfragen.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA-Fallback: alles, was keine Datei ist, geht auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST-API + WebSocket: /api/* -> Backend
    # Der Upgrade-Header wird mitgereicht, sodass /api/scale/stream als
    # WebSocket arbeitet.
    location /api/ {
        proxy_pass http://waage-backend:8200/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # Direkter Health-Check
    location = /health {
        proxy_pass http://waage-backend:8200/health;
    }

    # OpenAPI / Swagger UI vom Backend durchreichen
    location = /docs {
        proxy_pass http://waage-backend:8200/docs;
    }
    location = /openapi.json {
        proxy_pass http://waage-backend:8200/openapi.json;
    }

    # Statische Assets aggressiv cachen
    location ~* \.(?:css|js|svg|png|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
